name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Reproduce experiment
        run: python experiments/run_thresholding_comparison.py --output results

      - name: Reproduce adaptive sensitivity analysis
        run: python experiments/run_adaptive_sensitivity.py --output results

      - name: Reproduce denoising comparison
        run: python experiments/run_denoising_comparison.py --output results

      - name: Reproduce inspected public workflow
        if: matrix.python-version == '3.12'
        run: python experiments/run_inspected_public_sample.py

      - name: Reproduce adaptive public sample
        if: matrix.python-version == '3.12'
        run: python experiments/run_adaptive_public_sample.py

      - name: Reproduce denoising public sample
        if: matrix.python-version == '3.12'
        run: python experiments/run_denoising_public_sample.py
